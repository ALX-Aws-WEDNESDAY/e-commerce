[pytest]
# Django settings module
DJANGO_SETTINGS_MODULE = auth_service.settings

# Python files
python_files = tests.py test_*.py *_tests.py

# Test discovery paths
testpaths = .

# Minimum Python version
minversion = 7.0

# Show extra test summary info
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers for organizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    django_db: marks tests that access database (Django specific)

# Coverage settings
# Note: Coverage configuration can also be in .coveragerc or setup.cfg
[coverage:run]
source = .
omit =
    */migrations/*
    */tests/*
    manage.py
    */__init__.py
    */wsgi.py
    */asgi.py
    */apps.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    class .*\(Protocol\):
    @(abc\.)?abstractmethod
