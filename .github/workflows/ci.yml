name: python ci
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
jobs:
    #--------------------------------------
    # Check the formating and trailing spaces
    #---------------------------------------
    lint:
        name: Lint Code Base
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Set up Python
              uses: actions/setup-python@v2
              with:
                python-version: '3.x'

            - name: Install flake8
              run: pip install flake8

            - name: Run flake8
              run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    #--------------------------------------
    test:
        name: Run Tests
        needs: lint
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Set up Python
              uses: actions/setup-python@v2
              with:
                python-version: '3.x'

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run tests
              run: pytest tests/
