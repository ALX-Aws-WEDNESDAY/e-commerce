name: 'Terraform CI'

on:
  push:
    branches: [ main, dev, staging ]
    paths:
      - 'aws_infrastructure/01_org_setup/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [ main, dev, staging ]
    paths:
      - 'aws_infrastructure/01_org_setup/**'
      - '.github/workflows/terraform.yml'

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        path: [
          'aws_infrastructure/01_org_setup/00_bootstrap',
          'aws_infrastructure/01_org_setup/01_org',
          'aws_infrastructure/01_org_setup/02_identity/scps',
          'aws_infrastructure/01_org_setup/03_security/01_management_iam',
          'aws_infrastructure/01_org_setup/03_security/02_cloudtrail',
          'aws_infrastructure/01_org_setup/03_security/03_github_oidc'
        ]

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.10.0'

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color
        continue-on-error: true
