name: 'Terraform CI'

on:
  push:
    branches: [ main, dev, staging ]
    paths:
      - 'aws_infrastructure/01_org_setup/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [ main, dev, staging ]
    paths:
      - 'aws_infrastructure/01_org_setup/**'
      - '.github/workflows/terraform.yml'

# Reusable step definitions via defaults
defaults:
  run:
    shell: bash

# -- Shared step template (referenced via YAML anchors) ------------------------
# GitHub Actions does not support YAML anchors natively, so the common steps
# are duplicated across jobs. Each job is kept minimal to avoid drift.

jobs:

  # -- Stage 1: foundation workspaces ------------------------------------------
  # 00_bootstrap uses local state (no S3 backend yet).
  # 01_org writes the org/terraform.tfstate that every downstream workspace reads.
  # These two are independent of each other and run in parallel.

  bootstrap:
    name: 'bootstrap'
    runs-on: ubuntu-latest
    # No AWS credentials needed — fmt and validate are purely local checks.
    # bootstrap must never be planned or applied in CI: it uses local state
    # and is a one-time manual operation that creates the S3 state bucket.
    defaults:
      run:
        working-directory: aws_infrastructure/01_org_setup/00_bootstrap
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.10.0'
      - run: terraform fmt -check -recursive
        # init with no backend so validate can resolve provider schemas
        # without needing AWS credentials or a real state bucket.
      - run: terraform init -backend=false
      - run: terraform validate

  org:
    name: 'org'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: aws_infrastructure/01_org_setup/01_org
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.10.0'
      - run: terraform fmt -check -recursive
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -no-color
        continue-on-error: true

  # -- Stage 2: workspaces that read org remote state ---------------------------
  # scps, management_iam, and cloudtrail all depend on 01_org state being present.
  # They are independent of each other and run in parallel within this stage.

  scps:
    name: 'scps'
    runs-on: ubuntu-latest
    needs: org
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: aws_infrastructure/01_org_setup/02_identity/scps
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.10.0'
      - run: terraform fmt -check -recursive
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -no-color
        continue-on-error: true

  management_iam:
    name: 'management_iam'
    runs-on: ubuntu-latest
    needs: org
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: aws_infrastructure/01_org_setup/03_security/01_management_iam
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.10.0'
      - run: terraform fmt -check -recursive
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -no-color
        continue-on-error: true

  cloudtrail:
    name: 'cloudtrail'
    runs-on: ubuntu-latest
    needs: org
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: aws_infrastructure/01_org_setup/03_security/02_cloudtrail
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.10.0'
      - run: terraform fmt -check -recursive
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -no-color
        continue-on-error: true

  # -- Stage 3: github_oidc -----------------------------------------------------
  # Depends on management_iam because it attaches the EcommerceTerraformOps
  # policy that management_iam creates. Also inherits the org dependency
  # transitively through management_iam.

  github_oidc:
    name: 'github_oidc'
    runs-on: ubuntu-latest
    needs: management_iam
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: aws_infrastructure/01_org_setup/03_security/03_github_oidc
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.10.0'
      - run: terraform fmt -check -recursive
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -no-color
        continue-on-error: true
